<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#063672"/>
      <stop offset="100%" stop-color="#041f4a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pipeline diagram (right side, faded) -->
  <g opacity="0.22">
    <!-- Source boxes -->
    <rect x="820" y="80"  width="110" height="44" rx="6" fill="none" stroke="#8bb1d8" stroke-width="1.5"/>
    <text x="875" y="107" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">DVF</text>

    <rect x="820" y="145" width="110" height="44" rx="6" fill="none" stroke="#8bb1d8" stroke-width="1.5"/>
    <text x="875" y="172" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">DPE</text>

    <rect x="820" y="210" width="110" height="44" rx="6" fill="none" stroke="#8bb1d8" stroke-width="1.5"/>
    <text x="875" y="237" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Météo</text>

    <rect x="820" y="275" width="110" height="44" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="875" y="302" fill="#C6A763" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Euribor</text>

    <rect x="820" y="340" width="110" height="44" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="875" y="367" fill="#C6A763" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Eco2mix</text>

    <rect x="820" y="405" width="110" height="44" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="875" y="432" fill="#C6A763" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Loyers</text>

    <!-- Arrows to transformer -->
    <line x1="930" y1="102" x2="990" y2="260" stroke="#8bb1d8" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="930" y1="167" x2="990" y2="265" stroke="#8bb1d8" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="930" y1="232" x2="990" y2="270" stroke="#8bb1d8" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="930" y1="297" x2="990" y2="275" stroke="#9C824A" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="930" y1="362" x2="990" y2="280" stroke="#9C824A" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="930" y1="427" x2="990" y2="285" stroke="#9C824A" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Transformer / DuckDB box -->
    <rect x="990" y="230" width="130" height="80" rx="10" fill="#063672" opacity="0.9"/>
    <text x="1055" y="265" fill="#ffffff" font-size="14" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">DuckDB</text>
    <text x="1055" y="285" fill="#8bb1d8" font-size="11" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">gold layer</text>

    <!-- Arrow to gold -->
    <line x1="1120" y1="270" x2="1170" y2="270" stroke="#C6A763" stroke-width="2"/>
    <polygon points="1170,264 1182,270 1170,276" fill="#C6A763"/>

    <!-- Gold layer box -->
    <rect x="1182" y="240" width="0" height="0"/>
    <text x="1190" y="260" fill="#C6A763" font-size="12" font-family="Arial, Helvetica, sans-serif">mart_</text>
    <text x="1190" y="278" fill="#C6A763" font-size="12" font-family="Arial, Helvetica, sans-serif">context_</text>
    <text x="1190" y="296" fill="#C6A763" font-size="12" font-family="Arial, Helvetica, sans-serif">immo</text>
  </g>

  <!-- Left accent bar (blue) -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)"/>

  <!-- Tag -->
  <rect x="80" y="90" width="270" height="34" rx="17" fill="#063672" opacity="0.5"/>
  <text x="215" y="113" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="1">DATA · DUCKDB · ETL · PYTHON</text>

  <!-- Big faded background text -->
  <text x="72" y="240" fill="#063672" font-size="130" font-family="Arial, Helvetica, sans-serif" font-weight="900" opacity="0.25">DB</text>
  <text x="72" y="236" fill="#1e4d9e" font-size="130" font-family="Arial, Helvetica, sans-serif" font-weight="900" opacity="0.12">DB</text>

  <!-- Title -->
  <text x="80" y="255" fill="#ffffff" font-size="52" font-family="Arial, Helvetica, sans-serif" font-weight="700">DuckDB comme</text>
  <text x="80" y="320" fill="#ffffff" font-size="52" font-family="Arial, Helvetica, sans-serif" font-weight="700">gold layer</text>

  <!-- Accent line -->
  <rect x="80" y="346" width="120" height="4" rx="2" fill="#063672"/>

  <!-- Subtitle -->
  <text x="80" y="400" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">6 sources open data fusionnées en une seule table analytique</text>

  <!-- Footer -->
  <text x="80" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif">jose-pascal.vercel.app</text>
  <text x="1120" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif" text-anchor="end">José DACOSTA</text>
</svg>
