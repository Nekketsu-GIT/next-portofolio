<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9C824A"/>
      <stop offset="100%" stop-color="#6b5835"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- MCP diagram — server/client boxes connected by lines -->
  <g opacity="0.2">
    <!-- LLM Client box -->
    <rect x="830" y="130" width="140" height="70" rx="8" fill="none" stroke="#8bb1d8" stroke-width="1.5"/>
    <text x="900" y="170" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">LLM Client</text>

    <!-- MCP central node -->
    <rect x="840" y="270" width="120" height="60" rx="30" fill="#063672" opacity="0.8"/>
    <text x="900" y="306" fill="#ffffff" font-size="14" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">MCP</text>

    <!-- Server boxes -->
    <rect x="790" y="400" width="100" height="55" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="840" y="433" fill="#C6A763" font-size="11" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Notion</text>

    <rect x="910" y="400" width="100" height="55" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="960" y="433" fill="#C6A763" font-size="11" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">GitHub</text>

    <rect x="1030" y="400" width="100" height="55" rx="6" fill="none" stroke="#9C824A" stroke-width="1.5"/>
    <text x="1080" y="433" fill="#C6A763" font-size="11" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Postgres</text>

    <!-- Connection lines -->
    <line x1="900" y1="200" x2="900" y2="270" stroke="#8bb1d8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="900" y1="330" x2="840" y2="400" stroke="#9C824A" stroke-width="1.5"/>
    <line x1="900" y1="330" x2="960" y2="400" stroke="#9C824A" stroke-width="1.5"/>
    <line x1="900" y1="330" x2="1080" y2="400" stroke="#9C824A" stroke-width="1.5"/>

    <!-- Extra servers faded -->
    <circle cx="1130" cy="300" r="6" fill="#4b5563"/>
    <circle cx="1150" cy="240" r="6" fill="#4b5563"/>
    <circle cx="1150" cy="360" r="6" fill="#4b5563"/>
    <line x1="900" y1="300" x2="1124" y2="300" stroke="#374151" stroke-width="1"/>
    <line x1="900" y1="290" x2="1144" y2="242" stroke="#374151" stroke-width="1"/>
    <line x1="900" y1="310" x2="1144" y2="358" stroke="#374151" stroke-width="1"/>
  </g>

  <!-- Left accent (gold for this one) -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)"/>

  <!-- Tag -->
  <rect x="80" y="90" width="220" height="34" rx="17" fill="#9C824A" opacity="0.5"/>
  <text x="190" y="113" fill="#C6A763" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="1">IA · PROTOCOL · AGENTS</text>

  <!-- Big MCP letters -->
  <text x="80" y="235" fill="#063672" font-size="130" font-family="Arial, Helvetica, sans-serif" font-weight="900" opacity="0.3">MCP</text>
  <text x="80" y="230" fill="#1e4d9e" font-size="130" font-family="Arial, Helvetica, sans-serif" font-weight="900" opacity="0.15">MCP</text>

  <!-- Title over the big letters -->
  <text x="80" y="250" fill="#ffffff" font-size="58" font-family="Arial, Helvetica, sans-serif" font-weight="700">MCP : le protocole</text>
  <text x="80" y="322" fill="#ffffff" font-size="58" font-family="Arial, Helvetica, sans-serif" font-weight="700">qui change tout</text>

  <!-- Accent line -->
  <rect x="80" y="348" width="120" height="4" rx="2" fill="#9C824A"/>

  <!-- Subtitle -->
  <text x="80" y="408" fill="#94a3b8" font-size="23" font-family="Arial, Helvetica, sans-serif">Connecter vos outils aux LLMs de façon standardisée</text>

  <!-- Footer -->
  <text x="80" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif">jose-pascal.vercel.app</text>
  <text x="1120" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif" text-anchor="end">José DACOSTA</text>
</svg>
