<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#063672"/>
      <stop offset="100%" stop-color="#041f4a"/>
    </linearGradient>
    <linearGradient id="terminalGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Terminal window decoration (right side) -->
  <g transform="translate(760, 80)" opacity="0.35">
    <rect width="390" height="460" rx="10" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
    <!-- Terminal header -->
    <rect width="390" height="36" rx="10" fill="#252d3d"/>
    <rect y="18" width="390" height="18" fill="#252d3d"/>
    <circle cx="18" cy="18" r="6" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b" opacity="0.7"/>
    <circle cx="62" cy="18" r="6" fill="#22c55e" opacity="0.7"/>
    <text x="195" y="23" fill="#6b7280" font-size="11" font-family="monospace" text-anchor="middle">claude-code</text>
    <!-- Terminal content -->
    <text x="16" y="68" fill="#22c55e" font-size="13" font-family="monospace">$ claude</text>
    <text x="16" y="100" fill="#94a3b8" font-size="12" font-family="monospace">Claude Code ready.</text>
    <text x="16" y="132" fill="#6b7280" font-size="12" font-family="monospace">&gt; Add dark mode to all buttons</text>
    <text x="16" y="164" fill="#8bb1d8" font-size="12" font-family="monospace">Reading menu.tsx...</text>
    <text x="16" y="196" fill="#8bb1d8" font-size="12" font-family="monospace">Reading project-card.tsx...</text>
    <text x="16" y="228" fill="#C6A763" font-size="12" font-family="monospace">Editing 6 files...</text>
    <text x="16" y="260" fill="#22c55e" font-size="12" font-family="monospace">Build passed. Done.</text>
    <text x="16" y="300" fill="#6b7280" font-size="12" font-family="monospace">&gt; Write a FastAPI endpoint</text>
    <text x="16" y="332" fill="#8bb1d8" font-size="12" font-family="monospace">Checking existing patterns...</text>
    <text x="16" y="364" fill="#C6A763" font-size="12" font-family="monospace">Writing schema, service,</text>
    <text x="16" y="396" fill="#C6A763" font-size="12" font-family="monospace">router, migration...</text>
    <text x="16" y="428" fill="#22c55e" font-size="12" font-family="monospace">Done in 45s.</text>
    <!-- Blinking cursor -->
    <rect x="16" y="448" width="8" height="14" fill="#22c55e" opacity="0.8"/>
  </g>

  <!-- Left accent -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)"/>

  <!-- Tag -->
  <rect x="80" y="90" width="240" height="34" rx="17" fill="#063672" opacity="0.7"/>
  <text x="200" y="113" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="1">OUTILS · IA · PRODUCTIVITÉ</text>

  <!-- Title -->
  <text x="80" y="228" fill="#ffffff" font-size="66" font-family="Arial, Helvetica, sans-serif" font-weight="700">Claude Code</text>
  <text x="80" y="308" fill="#ffffff" font-size="66" font-family="Arial, Helvetica, sans-serif" font-weight="700">in Production</text>

  <!-- Accent line -->
  <rect x="80" y="334" width="120" height="4" rx="2" fill="#9C824A"/>

  <!-- Subtitle -->
  <text x="80" y="394" fill="#94a3b8" font-size="24" font-family="Arial, Helvetica, sans-serif">3 months of AI-native development</text>

  <!-- Footer -->
  <text x="80" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif">jose-pascal.vercel.app</text>
  <text x="1120" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif" text-anchor="end">José DACOSTA</text>
</svg>
