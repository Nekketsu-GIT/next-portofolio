<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#063672"/>
      <stop offset="100%" stop-color="#041f4a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neural network nodes (right side decoration) -->
  <g opacity="0.18">
    <!-- Layer 1 nodes -->
    <circle cx="850" cy="180" r="10" fill="#8bb1d8"/>
    <circle cx="850" cy="315" r="10" fill="#8bb1d8"/>
    <circle cx="850" cy="450" r="10" fill="#8bb1d8"/>
    <!-- Layer 2 nodes -->
    <circle cx="980" cy="225" r="14" fill="#063672"/>
    <circle cx="980" cy="315" r="14" fill="#9C824A"/>
    <circle cx="980" cy="405" r="14" fill="#063672"/>
    <!-- Layer 3 nodes -->
    <circle cx="1110" cy="270" r="10" fill="#8bb1d8"/>
    <circle cx="1110" cy="360" r="10" fill="#8bb1d8"/>
    <!-- Connections L1-L2 -->
    <line x1="860" y1="180" x2="966" y2="225" stroke="#063672" stroke-width="1.5"/>
    <line x1="860" y1="180" x2="966" y2="315" stroke="#063672" stroke-width="1"/>
    <line x1="860" y1="315" x2="966" y2="225" stroke="#063672" stroke-width="1"/>
    <line x1="860" y1="315" x2="966" y2="315" stroke="#9C824A" stroke-width="1.5"/>
    <line x1="860" y1="315" x2="966" y2="405" stroke="#063672" stroke-width="1"/>
    <line x1="860" y1="450" x2="966" y2="315" stroke="#063672" stroke-width="1"/>
    <line x1="860" y1="450" x2="966" y2="405" stroke="#063672" stroke-width="1.5"/>
    <!-- Connections L2-L3 -->
    <line x1="994" y1="225" x2="1100" y2="270" stroke="#063672" stroke-width="1.5"/>
    <line x1="994" y1="315" x2="1100" y2="270" stroke="#9C824A" stroke-width="1"/>
    <line x1="994" y1="315" x2="1100" y2="360" stroke="#9C824A" stroke-width="1.5"/>
    <line x1="994" y1="405" x2="1100" y2="360" stroke="#063672" stroke-width="1.5"/>
  </g>

  <!-- Left accent -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)"/>

  <!-- Top tag -->
  <rect x="80" y="90" width="240" height="34" rx="17" fill="#063672" opacity="0.7"/>
  <text x="200" y="113" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="1">ARCHITECTURE · IA · SAAS</text>

  <!-- Title -->
  <text x="80" y="220" fill="#ffffff" font-size="60" font-family="Arial, Helvetica, sans-serif" font-weight="700">Construire un LMS</text>
  <text x="80" y="296" fill="#ffffff" font-size="60" font-family="Arial, Helvetica, sans-serif" font-weight="700">multi-tenant avec IA</text>

  <!-- Accent line -->
  <rect x="80" y="322" width="120" height="4" rx="2" fill="#9C824A"/>

  <!-- Subtitle -->
  <text x="80" y="385" fill="#94a3b8" font-size="24" font-family="Arial, Helvetica, sans-serif">Retour d'expérience sur PAI</text>

  <!-- Tech badges -->
  <rect x="80" y="430" width="110" height="30" rx="6" fill="#063672" opacity="0.5"/>
  <text x="135" y="450" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">FastAPI</text>

  <rect x="206" y="430" width="120" height="30" rx="6" fill="#063672" opacity="0.5"/>
  <text x="266" y="450" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Keycloak</text>

  <rect x="342" y="430" width="160" height="30" rx="6" fill="#9C824A" opacity="0.4"/>
  <text x="422" y="450" fill="#C6A763" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Anthropic SDK</text>

  <rect x="518" y="430" width="100" height="30" rx="6" fill="#063672" opacity="0.5"/>
  <text x="568" y="450" fill="#8bb1d8" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Next.js</text>

  <!-- Footer -->
  <text x="80" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif">jose-pascal.vercel.app</text>
  <text x="1120" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif" text-anchor="end">José DACOSTA</text>
</svg>
