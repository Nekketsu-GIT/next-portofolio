<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Phone mockup (right side) -->
  <g transform="translate(530, 30)" opacity="0.28">
    <!-- Phone frame -->
    <rect x="50" y="0" width="180" height="360" rx="24" fill="none" stroke="#4b5563" stroke-width="3"/>
    <rect x="53" y="3" width="174" height="354" rx="22" fill="#111827"/>
    <!-- Notch -->
    <rect x="110" y="8" width="60" height="14" rx="7" fill="#1f2937"/>
    <!-- Screen content -->
    <rect x="60" y="35" width="160" height="40" rx="6" fill="#1e3a5f"/>
    <text x="140" y="59" fill="#8bb1d8" font-size="13" font-family="Arial, sans-serif" text-anchor="middle">Invitee</text>
    <!-- Event card -->
    <rect x="60" y="90" width="160" height="80" rx="8" fill="#1f2937"/>
    <rect x="60" y="90" width="160" height="5" rx="2" fill="#9C824A"/>
    <text x="140" y="118" fill="#e5e7eb" font-size="11" font-family="Arial, sans-serif" text-anchor="middle">Soirée d'anniversaire</text>
    <text x="140" y="138" fill="#6b7280" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">Samedi 24 mai · Paris</text>
    <text x="140" y="158" fill="#22c55e" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">12 invités confirmés</text>
    <!-- RSVP buttons -->
    <rect x="70" y="185" width="60" height="26" rx="13" fill="#22c55e" opacity="0.8"/>
    <text x="100" y="202" fill="#ffffff" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">Oui</text>
    <rect x="140" y="185" width="70" height="26" rx="13" fill="#374151"/>
    <text x="175" y="202" fill="#94a3b8" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">Peut-être</text>
    <!-- Second event -->
    <rect x="60" y="228" width="160" height="70" rx="8" fill="#1f2937"/>
    <rect x="60" y="228" width="160" height="5" rx="2" fill="#063672"/>
    <text x="140" y="256" fill="#e5e7eb" font-size="11" font-family="Arial, sans-serif" text-anchor="middle">BBQ de fin d'année</text>
    <text x="140" y="275" fill="#6b7280" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">Dimanche 1er juin</text>
    <text x="140" y="292" fill="#f59e0b" font-size="10" font-family="Arial, sans-serif" text-anchor="middle">En attente de réponse</text>
    <!-- Bottom nav -->
    <rect x="60" y="320" width="160" height="35" rx="0" fill="#1f2937"/>
    <line x1="60" y1="320" x2="220" y2="320" stroke="#374151" stroke-width="1"/>
    <text x="90" y="342" fill="#6b7280" font-size="20" font-family="Arial, sans-serif" text-anchor="middle">⊞</text>
    <text x="140" y="342" fill="#8bb1d8" font-size="20" font-family="Arial, sans-serif" text-anchor="middle">✉</text>
    <text x="190" y="342" fill="#6b7280" font-size="20" font-family="Arial, sans-serif" text-anchor="middle">◎</text>
    <!-- Home indicator -->
    <rect x="115" y="360" width="50" height="4" rx="2" fill="#4b5563"/>
  </g>

  <!-- Left accent -->
  <rect x="0" y="0" width="6" height="450" fill="#063672"/>

  <!-- Tag -->
  <rect x="60" y="70" width="200" height="28" rx="14" fill="#063672" opacity="0.6"/>
  <text x="160" y="89" fill="#8bb1d8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" letter-spacing="0.5">MOBILE · iOS · ANDROID</text>

  <!-- Project name -->
  <text x="60" y="192" fill="#ffffff" font-size="72" font-family="Arial, Helvetica, sans-serif" font-weight="900">Invitee</text>

  <!-- Tagline -->
  <text x="60" y="232" fill="#94a3b8" font-size="18" font-family="Arial, Helvetica, sans-serif">Event Management App</text>

  <!-- Accent line -->
  <rect x="60" y="252" width="80" height="3" rx="1.5" fill="#9C824A"/>

  <!-- Description -->
  <text x="60" y="297" fill="#6b7280" font-size="15" font-family="Arial, Helvetica, sans-serif">App mobile de gestion d'événements et RSVPs.</text>
  <text x="60" y="320" fill="#6b7280" font-size="15" font-family="Arial, Helvetica, sans-serif">Sans compte requis pour les invités.</text>

  <!-- Tags -->
  <rect x="60" y="352" width="100" height="26" rx="5" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
  <text x="110" y="370" fill="#94a3b8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Expo RN</text>

  <rect x="172" y="352" width="90" height="26" rx="5" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
  <text x="217" y="370" fill="#94a3b8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Firebase</text>

  <rect x="274" y="352" width="100" height="26" rx="5" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
  <text x="324" y="370" fill="#94a3b8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">TypeScript</text>

  <!-- Badge -->
  <rect x="60" y="398" width="120" height="28" rx="14" fill="#1e3a5f" opacity="0.8"/>
  <text x="120" y="417" fill="#93c5fd" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Store-ready</text>
</svg>
