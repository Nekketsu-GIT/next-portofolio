<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" rx="16" fill="#0a0f1e"/>

  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="80" y1="340" x2="720" y2="340" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="80" y1="260" x2="720" y2="260" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="180" x2="720" y2="180" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="100" x2="720" y2="100" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Bars — Opportunités (green) -->
  <rect x="105" y="210" width="32" height="130" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="205" y="190" width="32" height="150" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="305" y="230" width="32" height="110" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="405" y="170" width="32" height="170" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="505" y="200" width="32" height="140" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="605" y="155" width="32" height="185" rx="3" fill="#22c55e" opacity="0.85"/>

  <!-- Bars — Risques (red) -->
  <rect x="145" y="280" width="32" height="60" rx="3" fill="#ef4444" opacity="0.75"/>
  <rect x="245" y="295" width="32" height="45" rx="3" fill="#ef4444" opacity="0.75"/>
  <rect x="345" y="270" width="32" height="70" rx="3" fill="#ef4444" opacity="0.75"/>
  <rect x="445" y="300" width="32" height="40" rx="3" fill="#ef4444" opacity="0.75"/>
  <rect x="545" y="285" width="32" height="55" rx="3" fill="#ef4444" opacity="0.75"/>
  <rect x="645" y="265" width="32" height="75" rx="3" fill="#ef4444" opacity="0.75"/>

  <!-- Price line -->
  <polyline
    points="121,220 221,195 321,230 421,175 521,205 621,158"
    stroke="#063672" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="121" cy="220" r="5" fill="#0a4fa0"/>
  <circle cx="221" cy="195" r="5" fill="#0a4fa0"/>
  <circle cx="321" cy="230" r="5" fill="#0a4fa0"/>
  <circle cx="421" cy="175" r="5" fill="#0a4fa0"/>
  <circle cx="521" cy="205" r="5" fill="#0a4fa0"/>
  <circle cx="621" cy="158" r="5" fill="#0a4fa0"/>

  <!-- Euribor line -->
  <polyline
    points="121,290 221,285 321,270 421,255 521,248 621,242"
    stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="6 3" stroke-linecap="round"/>

  <!-- KPI cards -->
  <rect x="80" y="365" width="140" height="52" rx="8" fill="#0d1b2a" stroke="#1e2a3a" stroke-width="1"/>
  <text x="150" y="385" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">PRIX MÉDIAN/M²</text>
  <text x="150" y="405" font-family="monospace" font-size="14" fill="#f1f5f9" font-weight="bold" text-anchor="middle">6 840 €</text>

  <rect x="235" y="365" width="140" height="52" rx="8" fill="#0d1b2a" stroke="#1e2a3a" stroke-width="1"/>
  <text x="305" y="385" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">RENDEMENT MOY.</text>
  <text x="305" y="405" font-family="monospace" font-size="14" fill="#22c55e" font-weight="bold" text-anchor="middle">4.87 %</text>

  <rect x="390" y="365" width="140" height="52" rx="8" fill="#0d1b2a" stroke="#1e2a3a" stroke-width="1"/>
  <text x="460" y="385" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">EURIBOR 12M</text>
  <text x="460" y="405" font-family="monospace" font-size="14" fill="#f59e0b" font-weight="bold" text-anchor="middle">3.92 %</text>

  <rect x="545" y="365" width="175" height="52" rx="8" fill="#0d1b2a" stroke="#22c55e" stroke-width="1"/>
  <text x="632" y="385" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">SIGNAL</text>
  <text x="632" y="405" font-family="monospace" font-size="13" fill="#22c55e" font-weight="bold" text-anchor="middle">Opportunité ↑</text>

  <!-- Title -->
  <text x="80" y="38" font-family="monospace" font-size="13" fill="#0a4fa0" font-weight="bold">ContextBound</text>
  <text x="200" y="38" font-family="monospace" font-size="13" fill="#94a3b8"> / AI Temporal Engine — PropTech</text>
</svg>
