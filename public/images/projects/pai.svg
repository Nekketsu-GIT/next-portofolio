  <rect x="60" y="310" width="86" height="26" rx="5" fill="#063672" opacity="0.6"/>
  <text x="103" y="328" fill="#8bb1d8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">FastAPI</text>

  <rect x="158" y="310" width="76" height="26" rx="5" fill="#063672" opacity="0.6"/>
  <text x="196" y="328" fill="#8bb1d8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Next.js</text>

