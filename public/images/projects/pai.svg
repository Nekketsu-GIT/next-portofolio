  <!-- Left accent -->
  <rect x="0" y="0" width="6" height="450" fill="#063672"/>

  <!-- Project name -->
  <text x="60" y="155" fill="#ffffff" font-size="80" font-family="Arial, Helvetica, sans-serif" font-weight="900" opacity="0.1">PAI</text>
  <text x="60" y="150" fill="#8bb1d8" font-size="72" font-family="Arial, Helvetica, sans-serif" font-weight="900">PAI</text>

  <!-- Full name -->
  <text x="60" y="188" fill="#94a3b8" font-size="18" font-family="Arial, Helvetica, sans-serif">Plateforme Académique Intelligente</text>

  <!-- Accent line -->
  <rect x="60" y="208" width="80" height="3" rx="1.5" fill="#9C824A"/>

  <!-- Description -->
  <text x="60" y="255" fill="#6b7280" font-size="16" font-family="Arial, Helvetica, sans-serif">LMS multi-tenant avec IA — flashcards,</text>
  <text x="60" y="278" fill="#6b7280" font-size="16" font-family="Arial, Helvetica, sans-serif">quiz, résumés et Q&amp;A en streaming</text>

