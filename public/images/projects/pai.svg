  <text x="291" y="328" fill="#8bb1d8" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Keycloak</text>

  <rect x="348" y="310" width="130" height="26" rx="5" fill="#9C824A" opacity="0.4"/>
  <text x="413" y="328" fill="#C6A763" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Anthropic SDK</text>

  <!-- Status badge -->
  <rect x="60" y="360" width="130" height="28" rx="14" fill="#14532d" opacity="0.7"/>
  <circle cx="83" cy="374" r="5" fill="#22c55e"/>
  <text x="170" y="379" fill="#86efac" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Pré-production</text>
