<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle hexagon grid -->
  <g opacity="0.05" stroke="#8bb1d8" stroke-width="1" fill="none">
    <polygon points="580,80 620,60 660,80 660,120 620,140 580,120"/>
    <polygon points="640,120 680,100 720,120 720,160 680,180 640,160"/>
    <polygon points="580,160 620,140 660,160 660,200 620,220 580,200"/>
    <polygon points="700,60 740,40 780,60 780,100 740,120 700,100"/>
    <polygon points="640,200 680,180 720,200 720,240 680,260 640,240"/>
    <polygon points="700,140 740,120 780,140 780,180 740,200 700,180"/>
  </g>

  <!-- Progress/heatmap decoration -->
  <g opacity="0.2" transform="translate(530, 60)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="28" y="0" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="56" y="0" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="84" y="0" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="112" y="0" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="140" y="0" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="0" y="28" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="28" y="28" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="56" y="28" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="84" y="28" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="112" y="28" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="140" y="28" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="0" y="56" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="28" y="56" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="56" y="56" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="84" y="56" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="112" y="56" width="22" height="22" rx="3" fill="#063672"/>
    <rect x="140" y="56" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="28" y="84" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="56" y="84" width="22" height="22" rx="3" fill="#1e4d9e"/>
    <rect x="84" y="84" width="22" height="22" rx="3" fill="#9C824A"/>
    <rect x="112" y="84" width="22" height="22" rx="3" fill="#063672"/>
