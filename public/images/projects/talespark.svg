<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars decoration -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="550" cy="60" r="1.5"/>
    <circle cx="620" cy="40" r="1"/>
    <circle cx="680" cy="90" r="2"/>
    <circle cx="740" cy="55" r="1"/>
    <circle cx="590" cy="110" r="1.5"/>
    <circle cx="660" cy="130" r="1"/>
    <circle cx="710" cy="80" r="1.5"/>
    <circle cx="760" cy="110" r="1"/>
    <circle cx="570" cy="150" r="1"/>
    <circle cx="630" cy="160" r="2"/>
    <circle cx="700" cy="150" r="1"/>
    <circle cx="770" cy="145" r="1.5"/>
  </g>

  <!-- Open book icon (right side) -->
  <g transform="translate(530, 100)" opacity="0.25">
    <!-- Left page -->
    <path d="M100,30 Q60,20 20,30 L20,200 Q60,190 100,200 Z" fill="#9C824A"/>
    <!-- Right page -->
    <path d="M100,30 Q140,20 180,30 L180,200 Q140,190 100,200 Z" fill="#C6A763"/>
    <!-- Spine -->
    <rect x="97" y="28" width="6" height="174" fill="#7a6238"/>
    <!-- Lines on pages -->
    <g stroke="#7a5a20" stroke-width="1" opacity="0.5">
      <line x1="30" y1="70" x2="95" y2="68"/>
      <line x1="30" y1="90" x2="95" y2="88"/>
      <line x1="30" y1="110" x2="95" y2="108"/>
      <line x1="30" y1="130" x2="80" y2="128"/>
      <line x1="105" y1="70" x2="170" y2="68"/>
      <line x1="105" y1="90" x2="170" y2="88"/>
      <line x1="105" y1="110" x2="170" y2="108"/>
      <line x1="105" y1="130" x2="155" y2="128"/>
    </g>
    <!-- Sparkles on the book -->
    <text x="50" y="55" fill="#C6A763" font-size="20" opacity="0.8">✦</text>
    <text x="130" y="50" fill="#C6A763" font-size="14" opacity="0.8">✦</text>
    <text x="155" y="160" fill="#C6A763" font-size="10" opacity="0.6">✦</text>
  </g>

  <!-- Left accent (golden for warm tone) -->
  <rect x="0" y="0" width="6" height="450" fill="#9C824A"/>

  <!-- Project name -->
  <text x="60" y="155" fill="#9C824A" font-size="68" font-family="Arial, Helvetica, sans-serif" font-weight="900">Talespark</text>

  <!-- Tagline -->
  <text x="60" y="193" fill="#94a3b8" font-size="18" font-family="Arial, Helvetica, sans-serif">AI Children's Story Generator</text>

  <!-- Accent line -->
  <rect x="60" y="213" width="80" height="3" rx="1.5" fill="#9C824A"/>

  <!-- Description -->
  <text x="60" y="258" fill="#6b7280" font-size="16" font-family="Arial, Helvetica, sans-serif">Histoires personnalisées générées par IA.</text>
  <text x="60" y="281" fill="#6b7280" font-size="16" font-family="Arial, Helvetica, sans-serif">Guest mode, abonnements Stripe, multilingue.</text>

  <!-- Tags -->
  <rect x="60" y="313" width="76" height="26" rx="5" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="98" y="331" fill="#a78bfa" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Next.js</text>

  <rect x="148" y="313" width="80" height="26" rx="5" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="188" y="331" fill="#a78bfa" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">FastAPI</text>

  <rect x="240" y="313" width="66" height="26" rx="5" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="273" y="331" fill="#a78bfa" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Stripe</text>

  <rect x="318" y="313" width="66" height="26" rx="5" fill="#1e1035" stroke="#9C824A" stroke-width="1"/>
  <text x="351" y="331" fill="#C6A763" font-size="12" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Auth0</text>

  <!-- Live badge -->
  <rect x="60" y="360" width="90" height="28" rx="14" fill="#14532d" opacity="0.7"/>
  <circle cx="83" cy="374" r="5" fill="#22c55e"/>
  <text x="120" y="379" fill="#86efac" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Live</text>
</svg>
