<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0c1a10"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accessibility person icon (right side, abstract) -->
  <g transform="translate(850, 80)" opacity="0.2">
    <!-- Head -->
    <circle cx="110" cy="60" r="40" fill="none" stroke="#34d399" stroke-width="3"/>
    <!-- Body (arms open = universal accessibility symbol) -->
    <line x1="110" y1="100" x2="110" y2="240" stroke="#34d399" stroke-width="3"/>
    <!-- Arms outstretched -->
    <line x1="20" y1="160" x2="200" y2="160" stroke="#34d399" stroke-width="3"/>
    <!-- Legs -->
    <line x1="110" y1="240" x2="60" y2="360" stroke="#34d399" stroke-width="3"/>
    <line x1="110" y1="240" x2="160" y2="360" stroke="#34d399" stroke-width="3"/>
    <!-- Concentric circles (a11y / radar feel) -->
    <circle cx="110" cy="200" r="80" fill="none" stroke="#065f46" stroke-width="1" stroke-dasharray="6,4"/>
    <circle cx="110" cy="200" r="140" fill="none" stroke="#065f46" stroke-width="1" stroke-dasharray="6,4"/>
    <circle cx="110" cy="200" r="200" fill="none" stroke="#065f46" stroke-width="1" stroke-dasharray="6,4"/>
  </g>

  <!-- Screen reader / keyboard icons (subtle) -->
  <g opacity="0.08" transform="translate(700, 380)">
    <rect width="260" height="160" rx="12" fill="#065f46"/>
    <rect x="10" y="10" width="240" height="100" rx="6" fill="#0d1117"/>
    <text x="130" y="68" fill="#34d399" font-size="14" font-family="monospace" text-anchor="middle">Alt: "Navigation menu"</text>
    <rect x="20" y="120" width="40" height="28" rx="4" fill="#1a2e1a"/>
    <rect x="68" y="120" width="40" height="28" rx="4" fill="#1a2e1a"/>
    <rect x="116" y="120" width="80" height="28" rx="4" fill="#1a2e1a"/>
    <rect x="204" y="120" width="40" height="28" rx="4" fill="#1a2e1a"/>
  </g>

  <!-- Left accent (green for accessibility/inclusive) -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)"/>

  <!-- Tag -->
  <rect x="80" y="90" width="200" height="34" rx="17" fill="#065f46" opacity="0.8"/>
  <text x="180" y="113" fill="#34d399" font-size="13" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="1">ACCESSIBILITÉ · UX</text>

  <!-- Title -->
  <text x="80" y="228" fill="#ffffff" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="700">The Importance of</text>
  <text x="80" y="298" fill="#34d399" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="700">Accessibility</text>
  <text x="80" y="368" fill="#ffffff" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="700">in Software Development</text>

  <!-- Accent line -->
  <rect x="80" y="394" width="120" height="4" rx="2" fill="#34d399"/>

  <!-- Subtitle -->
  <text x="80" y="450" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">Building inclusive digital experiences for everyone</text>

  <!-- Footer -->
  <text x="80" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif">jose-pascal.vercel.app</text>
  <text x="1120" y="575" fill="#4b5563" font-size="16" font-family="Arial, Helvetica, sans-serif" text-anchor="end">José DACOSTA</text>
</svg>
